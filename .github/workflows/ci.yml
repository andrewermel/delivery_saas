name: Rails CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: 3.3
  NODE_VERSION: '18'

jobs:
  # 🔍 Análise Estática: Linting e Segurança
  lint:
    runs-on: ubuntu-latest
    name: Code Quality & Security Checks
    continue-on-error: false

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔴 Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: 1

      - name: 🔨 Run Rubocop (Linting)
        run: bundle exec rubocop --display-cop-names --extra-details --format json --out rubocop-report.json || true

      - name: 🔒 Run Brakeman Security Check
        run: bundle exec brakeman --format json --output brakeman-report.json || true

      - name: 📤 Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            rubocop-report.json
            brakeman-report.json
          retention-days: 30

  # ✅ Testes Automatizados com Cobertura
  test:
    runs-on: ubuntu-latest
    name: Unit & Integration Tests
    continue-on-error: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ermeltech_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ermeltech_saas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ermeltech_saas_test

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔴 Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: 1

      - name: 🗄️ Setup Database
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load

      - name: 🧪 Run RSpec Tests with Coverage
        run: |
          bundle exec rspec \
            --format documentation \
            --format RspecJunitFormatter \
            --out rspec-results.xml \
            --require spec_helper

      - name: 📊 Generate Coverage Report
        if: always()
        run: |
          if [ -d coverage ]; then
            echo "✅ Coverage report generated"
            cat coverage/.resultset.json 2>/dev/null | head -20 || echo "No coverage data"
          fi

      - name: 📤 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            rspec-results.xml
            coverage/
          retention-days: 30

      - name: 📝 Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: RSpec Results
          path: rspec-results.xml
          reporter: java-junit
          fail-on-error: true

  # 📊 Status Summary
  ci-status:
    runs-on: ubuntu-latest
    name: CI Pipeline Status
    needs: [lint, test]
    if: always()

    steps:
      - name: 📊 Check Pipeline Status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline FAILED"
            exit 1
          else
            echo "✅ CI Pipeline PASSED"
            exit 0
          fi

      - name: ✅ All Checks Passed
        if: success()
        run: |
          echo "🎉 All CI checks passed successfully!"
          echo "✅ Linting: PASSED"
          echo "✅ Security: CHECKED"
          echo "✅ Tests: PASSED"

      - name: ❌ Pipeline Failed
        if: failure()
        run: |
          echo "🚨 CI Pipeline failed. Check the logs above for details."
          exit 1
